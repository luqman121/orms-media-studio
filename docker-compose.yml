services:
  db:
    image: postgres:16-alpine
    container_name: orms-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=orms
      - POSTGRES_PASSWORD=orms
      - POSTGRES_DB=orms
    volumes:
      - orms-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U orms']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: orms-redis
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: apply Prisma migrations before the app starts.
  migrate:
    build:
      context: .
      target: builder
    command: npm run migrate:deploy
    environment:
      - DATABASE_URL=postgresql://orms:orms@db:5432/orms?schema=public
    depends_on:
      db:
        condition: service_healthy

  web:
    build: .
    container_name: orms-web
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - JWT_SECRET=change-me-to-a-long-random-string
      - OPENROUTER_API_KEY=your-openrouter-api-key-here
      - APP_REFERER=http://localhost:3000
      - APP_TITLE=OpenRouter Media Studio
      - DATABASE_URL=postgresql://orms:orms@db:5432/orms?schema=public
      - REDIS_URL=redis://redis:6379
      # Phase 4: Cloudflare R2 — set real values in a .env file or secrets manager.
      - R2_ACCOUNT_ID=your-cloudflare-account-id
      - R2_ACCESS_KEY_ID=your-r2-access-key-id
      - R2_SECRET_ACCESS_KEY=your-r2-secret-access-key
      - R2_BUCKET=orms-assets
      # Phase 6: Sentry (optional) — uncomment and fill in when deploying.
      # - SENTRY_DSN=https://your-key@oXXX.ingest.sentry.io/YYYY
      # - NEXT_PUBLIC_SENTRY_DSN=https://your-key@oXXX.ingest.sentry.io/YYYY
      # Phase 6: Upstash rate limiting (optional).
      # - UPSTASH_REDIS_REST_URL=https://your-db.upstash.io
      # - UPSTASH_REDIS_REST_TOKEN=your-token-here
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: orms-worker
    restart: unless-stopped
    ports:
      - '4001:4001'
    environment:
      - DATABASE_URL=postgresql://orms:orms@db:5432/orms?schema=public
      - REDIS_URL=redis://redis:6379
      - OPENROUTER_API_KEY=your-openrouter-api-key-here
      - R2_ACCOUNT_ID=your-cloudflare-account-id
      - R2_ACCESS_KEY_ID=your-r2-access-key-id
      - R2_SECRET_ACCESS_KEY=your-r2-secret-access-key
      - R2_BUCKET=orms-assets
      - ADMIN_SECRET=change-me-to-a-long-random-string
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  orms-pgdata:
